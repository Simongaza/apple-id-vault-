<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: white; font-family: -apple-system, sans-serif; text-align: center; padding: 50px 20px; }
        .container { max-width: 400px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 20px; background: #111; }
        
        /* The Loading Bar */
        .progress-box { width: 100%; background: #333; border-radius: 10px; height: 10px; margin: 20px 0; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #007AFF; transition: width 1s linear; }
        
        #id-box { display: none; background: #222; padding: 15px; border-radius: 15px; border: 1px solid #007AFF; margin-top: 20px; }
        .id-text { color: #007AFF; font-weight: bold; font-size: 18px; margin: 5px 0; }
        h2 { font-size: 22px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-area">
        <h2>🛡️ Secure Verification</h2>
        <p style="color: #888;">Connecting to Apple Vault...</p>
        
        <div class="progress-box">
            <div id="bar" class="progress-fill"></div>
        </div>
        
        <p>Unlocking in <span id="timer">10</span>s</p>
    </div>

    <div id="id-box">
        <h2 style="color: #4cd964;">✅ ACCESS GRANTED</h2>
        <p>Copy and use in App Store:</p>
        <div class="id-text">ID: your-email@gmail.com</div>
        <div class="id-text">PASS: YourPassword123</div>
        <p style="font-size: 12px; color: #888;">Status: WORKING (Updated Today)</p>
    </div>
</div>

<script>
    let timeLeft = 10;
    let barWidth = 0;
    const timerText = document.getElementById('timer');
    const bar = document.getElementById('bar');
    const loadingArea = document.getElementById('loading-area');
    const idBox = document.getElementById('id-box');

    const countdown = setInterval(() => {
        timeLeft--;
        barWidth += 10; // Increases bar by 10% every second
        
        timerText.innerText = timeLeft;
        bar.style.width = barWidth + "%";

        if (timeLeft <= 0) {
            clearInterval(countdown);
            loadingArea.style.display = 'none';
            idBox.style.display = 'block';
        }
    }, 1000);
</script>

</body>
</html>
