        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0; background: #000; height: 100vh; overflow: hidden;
            font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center;
        }

        /* VERTICAL FALLING SYSTEM */
        .bg-stream {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: space-around;
            opacity: 0.2; z-index: 1; pointer-events: none;
        }

        .column { display: flex; flex-direction: column; gap: 25px; animation: fall linear infinite; }
        
        @keyframes fall {
            from { transform: translateY(-50%); }
            to { transform: translateY(0%); }
        }

        .column img {
            width: 80px; height: 80px; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* CENTER CARD */
        .vault-card { 
            position: relative; z-index: 10; width: 90%; max-width: 380px;
            background: rgba(15, 15, 20, 0.9); backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 44px; padding: 50px 30px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .verify-btn {
            background: #fff; color: #000; font-weight: 900;
            transition: all 0.2s ease;
        }
        
        .verify-btn:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
