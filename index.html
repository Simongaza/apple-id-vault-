<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura iOS | Maintenance</title>
    <style>
        body { background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { padding: 40px; border-radius: 30px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); max-width: 400px; width: 90%; }
        .logo { width: 60px; margin-bottom: 20px; filter: invert(1); opacity: 0.8; }
        h1 { font-size: 24px; margin-bottom: 10px; letter-spacing: 1px; }
        p { color: #888; line-height: 1.6; font-size: 15px; }
        .date { color: #007AFF; font-weight: bold; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; }
        .spinner { border: 2px solid rgba(255,255,255,0.1); border-left-color: #007AFF; width: 20px; height: 20px; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="logo">
        <h1>AURA EXECUTIVE</h1>
        <p>Our servers are undergoing a massive "Executive Upgrade." We are moving to private, high-security Apple IDs to ensure 0% lock rates.</p>
        <div class="spinner"></div>
        <div class="date">Expected Launch: May 2026</div>
        <p style="font-size: 11px; margin-top: 30px; opacity: 0.5;">Managed by Simon (global Branch)</p>
    </div>
</body>
</html>
