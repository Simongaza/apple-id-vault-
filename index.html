<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon VIP Vault v2.0</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; }
        body { background: radial-gradient(circle at top, #1a1a1a, #000); color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; padding: 40px 25px; width: 85%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .apple-logo { width: 55px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)) invert(1); }
        h1 { font-size: 24px; font-weight: 600; margin: 10px 0; letter-spacing: -0.5px; }
        .lang-status { font-size: 11px; color: var(--ios-blue); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Progress System */
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; margin: 25px 0; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--ios-blue); transition: width 1s linear; box-shadow: 0 0 15px var(--ios-blue); }
        
        .btn { background: var(--ios-blue); color: white; padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; transition: 0.3s; border: none; cursor: pointer; font-size: 16px; }
        .btn:active { transform: scale(0.95); }

        /* The Result Box */
        #result-area { margin-top: 25px; padding: 25px; border-radius: 20px; background: rgba(0,0,0,0.5); display: none; text-align: left; border: 1px solid var(--ios-green); animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .id-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .id-value { font-weight: 600; font-size: 17px; margin-bottom: 15px; color: white; border-bottom: 1px solid #222; padding-bottom: 8px; }

        footer { margin-top: 35px; font-size: 11px; opacity: 0.4; line-height: 1.6; }
        .simon-badge { color: var(--ios-blue); font-weight: bold; opacity: 1; }
    </style>
</head>
<body>

<div class="glass-card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="apple-logo" alt="Apple">
    
    <div id="setup-view">
        <div id="lang-info" class="lang-status">System: Secure Connection</div>
        <h1 id="title">iOS Premium Unlocker</h1>
        <p id="desc" style="color: #888; font-size: 14px;">Click below to verify your session. Decryption takes 10 seconds.</p>
        
        <button class="btn" id="start-btn" onclick="secureStart()">🔓 UNLOCK NOW</button>
        
        <div class="progress-container" id="p-wrap">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <p id="timer-msg" style="display:none; font-size: 14px; color: #ccc;">Decrypting server files... <span id="secs" style="color:var(--ios-blue); font-weight:bold;">10</span>s</p>
    </div>

    <div id="result-area">
        <h3 id="res-header" style="color: var(--ios-green); margin: 0 0 15px 0; font-size: 18px;">✔ Access Granted</h3>
        <div class="id-label" id="label-mail">Apple ID / Email</div>
        <div id="res-email" class="id-value"></div>
        <div class="id-label" id="label-pass">Password</div>
        <div id="res-pass" class="id-value"></div>
        <p style="font-size: 10px; color: #ff3b30; margin: 0;">⚠️ App Store Only. iCloud = Device Lock.</p>
    </div>

    <footer>
        © 2026 Apple Vault International<br>
        Managed by <span class="simon-badge">SIMON (RUS/UG BRANCH)</span>
    </footer>
</div>

<script>
    // 1. Language Detection Logic
    const userLang = navigator.language || navigator.userLanguage;
    const isRussian = userLang.includes('ru');

    if (isRussian) {
        document.getElementById('lang-info').innerText = "Система: Безопасное соединение";
        document.getElementById('title').innerText = "Премиум Разблокировщик";
        document.getElementById('desc').innerText = "Нажмите ниже для проверки. Расшифровка займет 10 секунд.";
        document.getElementById('start-btn').innerText = "🔓 РАЗБЛОКИРОВАТЬ";
        document.getElementById('timer-msg').innerHTML = "Расшифровка файлов... <span id='secs' style='color:var(--ios-blue); font-weight:bold;'>10</span>с";
    }

    function secureStart() {
        // MONETAG LINK - CHANGE THIS BELOW
        window.open("https://omg10.com/4/10647983", "_blank");

        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('desc').style.display = 'none';
        document.getElementById('p-wrap').style.display = 'block';
        document.getElementById('timer-msg').style.display = 'block';

        let count = 10;
        let width = 0;
        const bar = document.getElementById('p-bar');
        const secs = document.getElementById('secs');

        const itv = setInterval(() => {
            count--;
            width += 10;
            bar.style.width = width + "%";
            secs.innerText = count;

            if (count <= 0) {
                clearInterval(itv);
                revealData();
            }
        }, 1000);
    }

    function revealData() {
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        if (isRussian) {
            document.getElementById('res-header').innerText = "✔ Доступ разрешен";
            document.getElementById('label-mail').innerText = "APPLE ID / ПОЧТА";
            document.getElementById('label-pass').innerText = "ПАРОЛЬ";
        }

        // YOUR DATA - These are only put on the screen AFTER the 10s wait
        document.getElementById('res-email').innerText = "simon-premium-ru@apple.com";
        document.getElementById('res-pass').innerText = "Vault2026!Simon";
    }
</script>

</body>
</html>
