<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIMON VEYRON | Official Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .glass { background: #111; border: 1px solid #222; border-radius: 24px; }
        .ios-btn { background: #fff; color: #000; border-radius: 12px; font-weight: 900; }
        .game-icon { width: 80px; height: 80px; border-radius: 18px; border: 1px solid #333; background-size: cover; flex-shrink: 0; }
        /* Real Icons via direct stable CDN */
        .ic-mc { background-image: url('https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png'); }
        .ic-gta { background-image: url('https://upload.wikimedia.org/wikipedia/en/c/c4/GTASA_logo.jpg'); }
        .ic-bully { background-image: url('https://upload.wikimedia.org/wikipedia/en/e/ee/Bully_Scholarship_Edition_Box_Art.jpg'); }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.3s ease-in-out; border: 2px solid #ff3b30 !important; }
    </style>
</head>
<body class="p-6">

    <div class="flex justify-between items-center mb-8">
        <h1 class="font-black italic text-xl">SIMON VEYRON</h1>
        <div class="bg-zinc-800 px-3 py-1 rounded-full text-[10px] font-bold">ONLINE</div>
    </div>

    <div class="flex gap-4 overflow-x-auto mb-10 pb-2">
        <div class="game-icon ic-mc"></div>
        <div class="game-icon ic-gta"></div>
        <div class="game-icon ic-bully"></div>
    </div>

    <div class="glass p-8 text-center" id="card">
        <div id="step-1">
            <h2 class="text-2xl font-black mb-2">Verification</h2>
            <p class="text-zinc-500 text-sm mb-6">Stay on the ad page for 30s to release the Apple ID.</p>
            <button onclick="startFlow()" class="ios-btn w-full py-4 text-sm uppercase">Unlock Now</button>
        </div>

        <div id="step-2" class="hidden">
            <div class="text-5xl font-black mb-4" id="timer">30</div>
            <p class="text-blue-400 font-bold text-xs uppercase tracking-widest" id="status">Verifying Ad View...</p>
        </div>

        <div id="step-3" class="hidden text-left space-y-4">
            <div class="bg-zinc-900 p-4 rounded-xl">
                <p class="text-[10px] text-zinc-500 font-bold uppercase">Apple ID</p>
                <p class="font-mono text-white">vault.veyron@apple.com</p>
            </div>
            <div class="bg-zinc-900 p-4 rounded-xl">
                <p class="text-[10px] text-zinc-500 font-bold uppercase">Password</p>
                <p class="font-mono text-white">Veyron2026!</p>
            </div>
        </div>
    </div>

    <script>
        let count = 30;
        let active = false;
        let lastSeen = Date.now();

        function startFlow() {
            window.open("https://omg10.com/4/10647983", '_blank');
            active = true;
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            
            setInterval(() => {
                if (active) {
                    // THE CHEAT CHECK:
                    // If the user is looking at THIS page (document.hidden is false),
                    // but the clock says they've been here for more than 1.5 seconds... 
                    // it means they are waiting here instead of the ad. RESET.
                    if (!document.hidden) {
                        let now = Date.now();
                        if (now - lastSeen > 1500) {
                            count = 30; // RESET TO 30
                            document.getElementById('card').classList.add('shake');
                            document.getElementById('status').innerText = "STAY ON THE AD PAGE!";
                            setTimeout(() => document.getElementById('card').classList.remove('shake'), 500);
                        }
                        count--;
                        lastSeen = now;
                    }
                    
                    document.getElementById('timer').innerText = count;
                    if (count <= 0) {
                        active = false;
                        document.getElementById('step-2').classList.add('hidden');
                        document.getElementById('step-3').classList.remove('hidden');
                    }
                }
            }, 1000);
        }
    </script>
</body>
</html>
