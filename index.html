<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS 26 | SIMON CORTEZ Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; font-family: 'Inter', sans-serif;
        }

        /* THE HIGHWAY ENGINE (CANVAS) */
        #highwayCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000;
        }

        .glass { 
            background: rgba(10, 10, 15, 0.8); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 40px;
        }

        .vip-btn {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #000; font-weight: 900;
        }

        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.8s ease;
        }
        .loader-progress { width: 0%; height: 100%; background: #fff; animation: load 3.5s forwards; }
        @keyframes load { from { width: 0%; } to { width: 100%; } }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="text-5xl text-white"><i class="fab fa-apple"></i></div>
        <p class="text-[10px] uppercase tracking-[0.6em] text-white/40 mt-8 font-black">SIMON CORTEZ</p>
        <div class="w-[180px] h-[2px] bg-white/10 mt-6 overflow-hidden"><div class="loader-progress"></div></div>
    </div>

    <canvas id="highwayCanvas"></canvas>

    <nav class="fixed top-0 w-full z-50 px-6 py-6 flex justify-between items-center bg-black/50 backdrop-blur-lg border-b border-white/5">
        <div class="flex items-center gap-3"><i class="fab fa-apple text-white text-2xl"></i><span class="text-white font-black text-xl uppercase italic tracking-tighter">SIMON CORTEZ</span></div>
        <div class="flex items-center gap-2 text-white"><span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span><span class="text-[9px] font-black uppercase">Live Vault</span></div>
    </nav>

    <section class="relative z-10 mt-36 w-full max-w-md mx-auto px-5 pb-20">
        <div class="glass p-10 text-center shadow-2xl">
            
            <div id="unlock-section">
                <p class="text-blue-500 text-[10px] font-black uppercase tracking-[0.5em] mb-4">Security Handshake</p>
                <h1 class="text-white text-3xl font-black mb-8">Access Portal</h1>
                <div class="bg-white/5 p-6 rounded-3xl mb-10 border border-white/5 text-sm text-white/40">
                    Verify your connection to sync with the iOS 26 private keys.
                </div>
                <button onclick="handleAdClick()" id="unlockBtn" class="w-full py-5 bg-white text-black rounded-2xl text-[12px] font-black uppercase tracking-[0.2em]">Start Verification</button>
            </div>

            <div id="countdown-section" class="hidden py-4 text-center">
                <div class="relative flex items-center justify-center mb-10">
                    <svg class="w-36 h-36 transform -rotate-90">
                        <circle cx="72" cy="72" r="66" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="transparent" />
                        <circle id="timer-circle" cx="72" cy="72" r="66" stroke="#007AFF" stroke-width="5" fill="transparent" stroke-dasharray="415" stroke-dashoffset="0" stroke-linecap="round" />
                    </svg>
                    <span id="timer-text" class="absolute text-white text-4xl font-black font-mono">30s</span>
                </div>
                <p id="timer-status" class="text-[11px] text-blue-400 uppercase font-black italic animate-pulse">Decrypting...</p>
            </div>

            <div id="result-section" class="hidden space-y-4 text-left">
                <div class="bg-white/5 p-5 rounded-2xl border border-white/10">
                    <p class="text-[9px] text-white/40 font-black mb-1 uppercase tracking-widest">Apple ID Email</p>
                    <p class="text-sm font-mono text-blue-400 font-bold tracking-tighter text-white">vault.apple@simon.net</p>
                </div>
                <div class="bg-white/5 p-5 rounded-2xl border border-white/10">
                    <p class="text-[9px] text-white/40 font-black mb-1 uppercase tracking-widest">Secret Password</p>
                    <p class="text-sm font-mono text-blue-400 font-bold tracking-tighter text-white">SIMON_CORTEZ_2026</p>
                </div>
                <div class="pt-4">
                    <a href="https://t.me/SIMONCORTEZ" target="_blank" class="vip-btn block w-full py-5 text-center rounded-2xl">
                        <div class="text-[11px] font-black uppercase tracking-[0.2em]">GET FULL VIP ACCESS</div>
                        <div class="text-[9px] font-bold opacity-70 uppercase mt-1">$4.00 USD / EVERY MONTH</div>
                    </a>
                </div>
            </div>
        </div>
    </section>

    <a href="https://t.me/SIMONCORTEZ" target="_blank" class="fixed bottom-10 right-6 w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-2xl text-white shadow-xl z-50">
        <i class="fab fa-telegram-plane"></i>
    </a>

    <script>
        // HIGHWAY ANIMATION CODE
        const canvas = document.getElementById('highwayCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 400;

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width - canvas.width / 2,
                    y: Math.random() * canvas.height - canvas.height / 2,
                    z: Math.random() * canvas.width,
                    o: Math.random()
                });
            }
        }

        function updateStars() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < numStars; i++) {
                let s = stars[i];
                s.z -= 5; // SPEED OF HIGHWAY
                if (s.z <= 0) s.z = canvas.width;
                
                let sx = (s.x / s.z) * canvas.width + canvas.width / 2;
                let sy = (s.y / s.z) * canvas.height + canvas.height / 2;
                let size = (1 - s.z / canvas.width) * 3;
                
                ctx.fillStyle = `rgba(255, 255, 255, ${1 - s.z / canvas.width})`;
                ctx.beginPath();
                ctx.arc(sx, sy, size, 0, Math.PI * 2);
                ctx.fill();
            }
            requestAnimationFrame(updateStars);
        }

        initStars();
        updateStars();
        window.addEventListener('resize', initStars);

        // LOGIC CODE
        const MONETAG_LINK = "https://omg10.com/4/10647983";
        let adClicked = false, timerStarted = false, timeRemaining = 30, timerInterval;

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                setTimeout(() => document.getElementById('preloader').style.display = 'none', 800);
            }, 3500);
        });

        function handleAdClick() {
            adClicked = true;
            window.open(MONETAG_LINK, '_blank');
            document.getElementById('unlockBtn').innerHTML = `Syncing...`;
        }

        window.onfocus = () => {
            if (adClicked && !timerStarted) startTimer();
            else if (timerStarted && timeRemaining > 0) resumeTimer();
        };

        window.onblur = () => { if (timerStarted) pauseTimer(); };

        function startTimer() {
            timerStarted = true;
            document.getElementById('unlock-section').classList.add('hidden');
            document.getElementById('countdown-section').classList.remove('hidden');
            resumeTimer();
        }

        function resumeTimer() {
            timerInterval = setInterval(() => {
                timeRemaining--;
                document.getElementById('timer-text').innerText = timeRemaining + "s";
                document.getElementById('timer-circle').style.strokeDashoffset = 415 - (timeRemaining / 30) * 415;
                if (timeRemaining <= 0) { clearInterval(timerInterval); showID(); }
            }, 1000);
        }

        function pauseTimer() { clearInterval(timerInterval); }

        function showID() {
            document.getElementById('countdown-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
        }
    </script>
</body>
</html>
