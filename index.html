<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon VIP Vault v2.0</title>
    <style>
        :root { --ios-blue: #007AFF; --ios-green: #34C759; }
        body { background: radial-gradient(circle at top, #1a1a1a, #000); color: white; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 40px 20px; width: 90%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .apple-logo { width: 50px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        h1 { font-size: 22px; font-weight: 600; margin: 10px 0; }
        .lang-switch { font-size: 12px; color: var(--ios-blue); margin-bottom: 20px; }
        
        /* Progress System */
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; margin: 20px 0; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: var(--ios-blue); transition: width 1s linear; box-shadow: 0 0 15px var(--ios-blue); }
        
        .btn { background: var(--ios-blue); color: white; padding: 16px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; display: inline-block; transition: 0.3s; border: none; cursor: pointer; }
        .btn:hover { transform: scale(1.05); }

        /* The Secret Result Box */
        #result-area { margin-top: 20px; padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.4); display: none; text-align: left; border: 1px solid var(--ios-green); animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        footer { margin-top: 30px; font-size: 12px; opacity: 0.5; }
        .simon-badge { color: var(--ios-blue); font-weight: bold; }
    </style>
</head>
<body>

<div class="glass-card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="apple-logo" style="filter: invert(1);">
    
    <div id="setup-view">
        <div class="lang-switch">EN | RU (Автоматический выбор)</div>
        <h1 id="title">Premium iOS Unlocker</h1>
        <p id="desc" style="color: #aaa;">Click below to trigger the secure decryption. Do not close the ad tab.</p>
        
        <button class="btn" id="start-btn" onclick="secureStart()">🔓 UNLOCK NOW</button>
        
        <div class="progress-container" id="p-wrap">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <p id="timer-msg" style="display:none; font-size: 14px;">Decrypting files... <span id="secs">10</span>s</p>
    </div>

    <div id="result-area">
        <h3 style="color: var(--ios-green); margin: 0 0 10px 0;">✔ Decryption Complete</h3>
        <small style="color: #888;">coming soon</small>
        <div id="res-email" style="font-weight: 600; margin-bottom: 10px; color: var(--ios-blue);"></div>
        <small style="color: #888;">coming soon</small>
        <div id="res-pass" style="font-weight: 600; color: var(--ios-blue);"></div>
    </div>

    <footer>
        © 2026 Apple Vault International<br>
        Powered by <span class="simon-badge">SIMON (RUS/UG BRANCH)</span>
    </footer>
</div>

<script>
    function secureStart() {
        // OPEN THE AD IN NEW TAB (Monetag Link)
        window.open("https://omg10.com/4/10647983", "_blank");

        // Change UI
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('desc').style.display = 'none';
        document.getElementById('p-wrap').style.display = 'block';
        document.getElementById('timer-msg').style.display = 'block';

        let count = 10;
        let width = 0;
        const bar = document.getElementById('p-bar');
        const secs = document.getElementById('secs');

        const itv = setInterval(() => {
            count--;
            width += 10;
            bar.style.width = width + "%";
            secs.innerText = count;

            if (count <= 0) {
                clearInterval(itv);
                revealData();
            }
        }, 1000);
    }

    function revealData() {
        // THE DATA IS INJECTED ONLY NOW (Cannot be seen in source code earlier)
        document.getElementById('setup-view').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        
        document.getElementById('res-email').innerText = "simon-premium-ru@apple.com";
        document.getElementById('res-pass').innerText = "Vault2026!Simon";
    }
</script>

</body>
</html>
