        body {
            margin: 0; background: #000; height: 100vh; overflow: hidden;
            font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center;
        }

        /* MARQUEE SYSTEM */
        .marquee-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center;
            gap: 20px; opacity: 0.25; z-index: 1; pointer-events: none;
        }

        .marquee { width: 100%; overflow: hidden; white-space: nowrap; display: flex; }

        /* Row 1 - Moves Left */
        .track-left { display: flex; animation: scrollLeft 25s linear infinite; }
        @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* Row 2 - Moves Right */
        .track-right { display: flex; animation: scrollRight 25s linear infinite; }
        @keyframes scrollRight { from { transform: translateX(-50%); } to { transform: translateX(0); } }

        .track img {
            width: 85px; height: 85px; margin: 0 15px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }

        /* CARD DESIGN */
        .glass { 
            position: relative; z-index: 10; width: 90%; max-width: 400px;
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 48px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        .vip-btn {

            color: #000; font-weight: 900;
        }
