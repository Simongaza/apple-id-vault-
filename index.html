<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCloud Elite</title>
    <!-- Tailwind CSS for utility layout structure -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-glass: rgba(255, 255, 255, 0.06);
            --ios-blur: blur(25px);
            --ios-border: 1px solid rgba(255, 255, 255, 0.08);
        }

        body {
            background: radial-gradient(circle at top, #1c1c1e, #000000);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* iOS Translucent Glassmorphism Style */
        .glass {
            background: var(--ios-glass);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: var(--ios-border);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .lang-btn {
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .lang-active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .ios-btn {
            background: #0A84FF;
            color: white;
            font-weight: 600;
            padding: 16px;
            border-radius: 14px;
            width: 100%;
            border: none;
            transition: transform 0.2s, background 0.2s;
        }

        .ios-btn:active {
            transform: scale(0.98);
            background: #0070e0;
        }

        .ios-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: #ffffff;
            font-family: monospace;
            font-size: 13px;
        }

        /* RTL Layout Support for Arabic */
        .rtl {
            direction: rtl;
            text-align: right;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <main id="main-content" class="w-full max-w-md space-y-6">
        
        <!-- Header & Language Selection -->
        <header class="flex items-center justify-between px-2">
            <div class="flex items-center space-x-2">
                <svg class="w-6 h-6 fill-current" viewBox="0 0 170 170">
                    <path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.17-14.34-3.17-4.58 0-9.49 1.05-14.75 3.17-5.26 2.13-9.5 3.24-12.74 3.35-4.38.13-9.13-1.91-14.26-6.12-3.46-2.91-7.4-7.73-11.83-14.46-5.12-7.74-9.44-16.71-12.96-26.93-3.52-10.22-5.28-20.1-5.28-29.63 0-14.34 3.78-25.79 11.33-34.36 7.56-8.57 16.9-12.89 28.03-12.97 4.25 0 9.17 1.21 14.75 3.63 5.58 2.42 9.4 3.63 11.47 3.63 1.83 0 5.86-1.29 12.07-3.87 6.21-2.58 11.04-3.79 14.5-3.63 14.34.46 25.13 5.76 32.37 15.91-12.56 7.64-18.73 17.84-18.52 30.59.21 10.15 4.1 18.57 11.68 25.26 7.58 6.69 16.4 10.21 26.47 10.56-.21 1.76-.52 3.86-.94 6.31zM116.32 23.36c0-6.93 2.42-13.23 7.26-18.89 5.5-6.42 12.21-9.94 20.12-10.56.08.75.12 1.41.12 1.98 0 6.69-2.49 13.04-7.46 19.03-2.58 3.15-5.83 5.92-9.74 8.31-3.91 2.38-7.79 3.67-11.64 3.87-.21-.54-.33-1.12-.33-1.74z"/>
                </svg>
                <span class="font-black text-lg tracking-tight uppercase">Simon Veyron</span>
            </div>
            <div class="flex space-x-1.5">
                <button id="btn-en" onclick="setLanguage('en')" class="lang-btn lang-active">EN</button>
                <button id="btn-ru" onclick="setLanguage('ru')" class="lang-btn">RU</button>
                <button id="btn-ar" onclick="setLanguage('ar')" class="lang-btn">AR</button>
            </div>
        </header>

        <!-- In This Vault: App Badge Showcase (Clean Monogram Badges) -->
        <div class="px-2">
            <h3 id="txt-vault" class="text-white/40 text-[10px] font-bold uppercase tracking-widest mb-3">In this Vault:</h3>
            <div class="flex space-x-4 overflow-x-auto no-scrollbar pb-1">
                
                <div class="flex flex-col items-center min-w-[64px]">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center bg-white/5 border border-white/10 text-white font-black text-sm tracking-tighter shadow-lg select-none">
                        GTA
                    </div>
                    <span class="text-[10px] font-semibold text-white/60 mt-1.5">GTA SA</span>
                </div>

                <div class="flex flex-col items-center min-w-[64px]">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center bg-white/5 border border-white/10 text-white font-black text-sm tracking-tighter shadow-lg select-none">
                        MC
                    </div>
                    <span class="text-[10px] font-semibold text-white/60 mt-1.5">Minecraft</span>
                </div>

                <div class="flex flex-col items-center min-w-[64px]">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center bg-white/5 border border-white/10 text-white font-black text-sm tracking-tighter shadow-lg select-none">
                        BY
                    </div>
                    <span class="text-[10px] font-semibold text-white/60 mt-1.5">Bully</span>
                </div>

                <div class="flex flex-col items-center min-w-[64px]">
                    <div class="w-14 h-14 rounded-2xl flex items-center justify-center bg-white/5 border border-white/10 text-white font-black text-sm tracking-tighter shadow-lg select-none">
                        SV
                    </div>
                    <span class="text-[10px] font-semibold text-white/60 mt-1.5">Stardew</span>
                </div>

            </div>
        </div>

        <!-- Dynamic Action Section Content -->
        <section class="relative w-full">
            
            <!-- Step 1: Unlock Action Window -->
            <div id="unlock-section" class="glass p-6 text-center space-y-6">
                <div class="space-y-2">
                    <h2 id="txt-title" class="text-2xl font-bold tracking-tight">Verification Required</h2>
                    <p id="txt-desc" class="text-xs text-white/60 px-4">Complete one sponsor handshake to release the Apple ID.</p>
                </div>
                <button id="unlockBtn" onclick="handleAdClick()" class="ios-btn text-sm shadow-xl">Unlock Apple ID</button>
            </div>

            <!-- Step 2: Countdown Window -->
            <div id="countdown-section" class="glass p-8 text-center space-y-6 hidden flex flex-col items-center justify-center">
                <div class="relative w-28 h-28 flex items-center justify-center">
                    <svg class="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 130 130">
                        <circle cx="65" cy="65" r="60" stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="none" />
                        <circle id="timer-circle" cx="65" cy="65" r="60" stroke="#0A84FF" stroke-width="4" fill="none" stroke-dasharray="377" stroke-dashoffset="0" style="transition: stroke-dashoffset 1s linear;" />
                    </svg>
                    <span id="timer-text" class="text-2xl font-bold tracking-tight">5s</span>
                </div>
                <p id="timer-status" class="text-xs tracking-wider text-white/50 uppercase font-bold">Decrypting...</p>
            </div>

            <!-- Step 3: Credentials Output Window -->
            <div id="result-section" class="hidden"></div>

        </section>

        <!-- Footer Login Regulations -->
        <div id="rules-box" class="glass p-5 space-y-3">
            <h3 id="txt-rules-head" class="text-blue-400 text-[10px] font-black uppercase tracking-widest">Login Rules</h3>
            <div id="txt-rules-list" class="text-xs text-white/60 space-y-2.5">
                <p>• App Store Login ONLY</p>
                <p>• NEVER use iCloud Settings</p>
                <p>• Sign out after download</p>
            </div>
        </div>
        
        <!-- Premium Entry Shortcut Button -->
        <div class="text-center pt-2">
            <a href="#" id="txt-vip" class="text-[11px] text-white/30 font-bold tracking-wider uppercase hover:text-white/60 transition-colors">Get VIP Access</a>
        </div>

    </main>

    <!-- Operational State Automation Engine -->
    <script>
        const MONETAG_LINK = "https://omg10.com/4/10647983";
        let timeRemaining = 5; // Updated to 5 seconds
        let timerStarted = false;
        let timerInterval;
        let currentLang = 'en';

        const translations = {
            en: {
                vault: "In this Vault:", title: "Verification Required", desc: "Complete one sponsor handshake to release the Apple ID.", unlock: "Unlock Apple ID", decrypting: "Decrypting...", warning: "BYPASS DETECTED", vip: "Get VIP Access", rules_h: "Login Rules", rules: "<p>• App Store Login ONLY</p><p>• NEVER use iCloud Settings</p><p>• Sign out after download</p>",
                email: "appvault.en@icloud.com", pass: "AppleVault77#"
            },
            ru: {
                vault: "В хранилище:", title: "Требуется проверка", desc: "Выполните одно задание, чтобы получить Apple ID.", unlock: "Разблокировать", decrypting: "Расшифровка...", warning: "ОБНАРУЖЕН ОБХОД", vip: "Получить VIP", rules_h: "Правила входа", rules: "<p>• Вход ТОЛЬКО в App Store</p><p>• НИКОГДА не входите в iCloud</p><p>• Выйдите после загрузки</p>",
                email: "appvault.ru@icloud.com", pass: "AppleVault77#"
            },
            ar: {
                vault: "في هذا المخزن:", title: "مطلوب التحقق", desc: "أكمل مهمة واحدة للحصول على حساب أبل إيدي.", unlock: "فتح الحساب الآن", decrypting: "جاري فك التشفير...", warning: "تم اكتشاف تجاوز - إعادة تعيين", vip: "احصل على اشتراك VIP", rules_h: "قواعد تسجيل الدخول", rules: "<p>• تسجيل الدخول في متجر التطبيقات فقط</p><p>• لا تستخدم إعدادات آي كلاود أبداً</p><p>• تسجيل الخروج بعد التحميل</p>",
                email: "appvault.ar@icloud.com", pass: "AppleVault77#"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            const content = document.getElementById('main-content');
            const rules = document.getElementById('rules-box');
            
            if(lang === 'ar') { content.classList.add('rtl'); rules.classList.add('rtl'); }
            else { content.classList.remove('rtl'); rules.classList.remove('rtl'); }

            document.getElementById('txt-vault').innerText = t.vault;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-desc').innerText = t.desc;
            document.getElementById('unlockBtn').innerText = t.unlock;
            
            if(!timerStarted) {
                document.getElementById('timer-status').innerText = t.decrypting;
            }
            
            document.getElementById('txt-vip').innerText = t.vip;
            document.getElementById('txt-rules-head').innerText = t.rules_h;
            document.getElementById('txt-rules-list').innerHTML = t.rules;
            
            ['en', 'ru', 'ar'].forEach(l => {
                document.getElementById('btn-'+l).className = lang === l ? 'lang-btn lang-active' : 'lang-btn';
            });
        }

        function handleAdClick() {
            window.open(MONETAG_LINK, '_blank');
            timerStarted = true;
            document.getElementById('unlock-section').classList.add('hidden');
            document.getElementById('countdown-section').style.display = 'flex';
            startTimer();
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && timerStarted && timeRemaining > 0) {
                clearInterval(timerInterval);
                timeRemaining = 5; 
                document.getElementById('timer-text').innerText = "5s";
                document.getElementById('timer-circle').style.strokeDashoffset = 0;
                document.getElementById('timer-status').innerHTML = `<span style="color:#ff453a; font-weight:900; tracking-wide">${translations[currentLang].warning}</span>`;
            } else if (!document.hidden && timerStarted && timeRemaining > 0) { 
                document.getElementById('timer-status').innerText = translations[currentLang].decrypting;
                startTimer(); 
            }
        });

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeRemaining--;
                document.getElementById('timer-text').innerText = timeRemaining + "s";
                // Synchronized circle offset animation calibrated to 5 seconds
                document.getElementById('timer-circle').style.strokeDashoffset = 377 - (timeRemaining / 5) * 377;
                if (timeRemaining <= 0) { 
                    clearInterval(timerInterval); 
                    showResult(); 
                }
            }, 1000);
        }

        function showResult() {
            document.getElementById('countdown-section').style.display = 'none';
            const resultSection = document.getElementById('result-section');
            
            resultSection.innerHTML = `
                <div class="glass p-6 text-center space-y-5 animate-fade-in">
                    <h3 class="text-green-400 font-black text-xl tracking-wide uppercase">🔓 Access Granted</h3>
                    <div class="text-left space-y-4">
                        <div class="flex flex-col space-y-1.5">
                            <label class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Apple ID / Email</label>
                            <input type="text" value="${translations[currentLang].email}" readonly class="ios-input w-full select-all focus:outline-none">
                        </div>
                        <div class="flex flex-col space-y-1.5">
                            <label class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Password</label>
                            <input type="text" value="${translations[currentLang].pass}" readonly class="ios-input w-full select-all focus:outline-none">
                        </div>
                    </div>
                    <div class="text-[10px] text-amber-400 font-medium bg-amber-500/10 border border-amber-500/20 p-3.5 rounded-xl">
                        ⚠️ Important: Use the App Store context options only. Syncing configuration changes inside core iCloud settings is prohibited.
                    </div>
                </div>
            `;
            resultSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
