<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCloud Elite</title>
    <!-- Tailwind CSS for utility layout structure -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --ios-glass: rgba(255, 255, 255, 0.06);
            --ios-blur: blur(25px);
            --ios-border: 1px solid rgba(255, 255, 255, 0.08);
        }

        body {
            background: radial-gradient(circle at top, #1c1c1e, #000000);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Splash Screen Base styles */
        #splash-screen {
            background: #000000;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        @keyframes spinner-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-spinner {
            animation: spinner-rotate 1s linear infinite;
        }

        /* iOS Translucent Glassmorphism Style */
        .glass {
            background: var(--ios-glass);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: var(--ios-border);
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        .lang-btn {
            padding: 6px 14px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .lang-active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
        }

        .ios-btn {
            background: #0A84FF;
            color: white;
            font-weight: 600;
            padding: 16px;
            border-radius: 14px;
            width: 100%;
            border: none;
            transition: transform 0.2s, background 0.2s;
        }

        .ios-btn:active {
            transform: scale(0.98);
            background: #0070e0;
        }

        .ios-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: #ffffff;
            font-family: monospace;
            font-size: 13px;
        }

        /* RTL Layout Support for Arabic */
        .rtl {
            direction: rtl;
            text-align: right;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- Loading Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center space-y-6">
        <div class="flex flex-col items-center space-y-6">
            <!-- Fixed Apple Logo with an iOS Spinning Track Around It -->
            <div class="relative w-20 h-20 flex items-center justify-center">
                <!-- Outer Spinner Ring -->
                <svg class="absolute inset-0 w-full h-full loading-spinner" viewBox="0 0 50 50">
                    <circle cx="25" cy="25" r="20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="3"></circle>
                    <circle cx="25" cy="25" r="20" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-dasharray="30 90"></circle>
                </svg>
                <!-- Perfectly Aligned Symmetrical Apple Icon -->
                <svg class="w-9 h-9 fill-white relative z-10" viewBox="0 0 24 24">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.58 2.95-1.39z"/>
                </svg>
            </div>
            <h1 class="font-black text-xl tracking-tight uppercase">Simon Veyron</h1>
        </div>
    </div>

    <!-- Main Content Container -->
    <main id="main-content" class="w-full max-w-md space-y-6 opacity-0" style="transition: opacity 0.5s ease;">
        
        <!-- Header & Language Selection -->
        <header class="flex items-center justify-between px-2">
            <div class="flex items-center space-x-2">
                <!-- Symmetrically Aligned Header Apple Icon -->
                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                    <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.58 2.95-1.39z"/>
                </svg>
                <span class="font-black text-lg tracking-tight uppercase">Simon Veyron</span>
            </div>
            <div class="flex space-x-1.5 overflow-x-auto no-scrollbar max-w-[200px]">
                <button id="btn-en" onclick="setLanguage('en')" class="lang-btn lang-active">English</button>
                <button id="btn-ru" onclick="setLanguage('ru')" class="lang-btn">Русский</button>
                <button id="btn-ar" onclick="setLanguage('ar')" class="lang-btn">العربية</button>
            </div>
        </header>

        <!-- Dynamic Contact Admin Row -->
        <div class="px-2">
            <a href="https://t.me/simonveyron" target="_blank" class="glass px-4 py-3 flex items-center justify-between hover:bg-white/10 transition-all group">
                <div class="flex items-center space-x-3">
                    <!-- Telegram Icon SVG -->
                    <div class="w-9 h-9 rounded-xl bg-[#229ED9]/20 flex items-center justify-center border border-[#229ED9]/30">
                        <svg class="w-5 h-5 fill-[#229ED9]" viewBox="0 0 24 24">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-1-.65-.35-1 .22-1.62.15-.15 2.7-2.46 2.75-2.67.01-.03.01-.14-.06-.2-.07-.06-.17-.04-.25-.02-.11.02-1.91 1.21-5.4 3.56-.51.35-.97.52-1.38.51-.46-.01-1.34-.26-1.99-.47-.8-.26-1.43-.4-1.38-.85.03-.23.35-.47.96-.71 3.76-1.64 6.27-2.72 7.54-3.25 3.58-1.48 4.32-1.74 4.81-1.75.11 0 .35.03.5.16.13.1.17.24.19.34.02.07.03.21.02.32z"/>
                        </svg>
                    </div>
                    <div class="text-left">
                        <p id="txt-contact-head" class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Support Access</p>
                        <p id="txt-contact-body" class="text-xs font-semibold text-white/90">Contact Admin on Telegram</p>
                    </div>
                </div>
                <svg class="w-4 h-4 text-white/30 group-hover:text-white/60 transform group-hover:translate-x-0.5 transition-all" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path>
                </svg>
            </a>
        </div>

        <!-- Dynamic Action Section Content -->
        <section class="relative w-full">
            
            <!-- Step 1: Unlock Action Window -->
            <div id="unlock-section" class="glass p-6 text-center space-y-6">
                <div class="space-y-2">
                    <h2 id="txt-title" class="text-2xl font-bold tracking-tight">Unlock Apple ID</h2>
                    <p id="txt-desc" class="text-xs text-white/60 px-4">Complete one sponsor handshake to release the Apple ID.</p>
                </div>
                <button id="unlockBtn" onclick="handleAdClick()" class="ios-btn text-sm shadow-xl">Unlock Apple ID</button>
            </div>

            <!-- Step 2: Countdown Window -->
            <div id="countdown-section" class="glass p-8 text-center space-y-6 hidden flex flex-col items-center justify-center">
                <div class="relative w-28 h-28 flex items-center justify-center">
                    <svg class="absolute inset-0 w-full h-full transform -rotate-90" viewBox="0 0 130 130">
                        <circle cx="65" cy="65" r="60" stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="none" />
                        <circle id="timer-circle" cx="65" cy="65" r="60" stroke="#0A84FF" stroke-width="4" fill="none" stroke-dasharray="377" stroke-dashoffset="0" style="transition: stroke-dashoffset 1s linear;" />
                    </svg>
                    <span id="timer-text" class="text-2xl font-bold tracking-tight">5s</span>
                </div>
                <p id="timer-status" class="text-xs tracking-wider text-white/50 uppercase font-bold">Decrypting...</p>
            </div>

            <!-- Step 3: Credentials Output Window -->
            <div id="result-section" class="hidden"></div>

        </section>

        <!-- Footer Login Regulations -->
        <div id="rules-box" class="glass p-5 space-y-3">
            <h3 id="txt-rules-head" class="text-blue-400 text-[10px] font-black uppercase tracking-widest">Login Rules</h3>
            <div id="txt-rules-list" class="text-xs text-white/60 space-y-2.5">
                <p>• App Store Login ONLY</p>
                <p>• NEVER use iCloud Settings</p>
                <p>• Sign out after download</p>
            </div>
        </div>
        
        <!-- Premium Entry Shortcut Button -->
        <div class="text-center pt-2">
            <a href="#" id="txt-vip" class="text-[11px] text-white/30 font-bold tracking-wider uppercase hover:text-white/60 transition-colors">Get VIP Access</a>
        </div>

    </main>

    <!-- Operational State Automation Engine -->
    <script>
        const MONETAG_LINK = "https://omg10.com/4/10647983";
        let timeRemaining = 5; 
        let timerStarted = false;
        let timerInterval;
        let currentLang = 'en';

        // Handles loading splash sequence
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const mainContent = document.getElementById('main-content');
                
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                mainContent.style.opacity = '1';
            }, 2500); 
        });

        const translations = {
            en: {
                contact_h: "Support Access", contact_b: "Contact Admin on Telegram", title: "Unlock Apple ID", desc: "Complete one sponsor handshake to release the Apple ID.", unlock: "Unlock Apple ID", decrypting: "Decrypting...", warning: "BYPASS DETECTED", vip: "Get VIP Access", rules_h: "Login Rules", rules: "<p>• App Store Login ONLY</p><p>• NEVER use iCloud Settings</p><p>• Sign out after download</p>",
                email: "SOON", pass: "SOON"
            },
            ru: {
                contact_h: "Служба поддержки", contact_b: "Связаться с админом в Telegram", title: "Разблокировать Apple ID", desc: "Выполните одно задание, чтобы получить Apple ID.", unlock: "Разблокировать", decrypting: "Расшифровка...", warning: "ОБНАРУЖЕН ОБХОД", vip: "Получить VIP", rules_h: "Правила входа", rules: "<p>• Вход ТОЛЬКО в App Store</p><p>• НИКОГДА не входите в iCloud</p><p>• Выйдите после загрузки</p>",
                email: "SOON", pass: "SOON"
            },
            ar: {
                contact_h: "وصول الدعم", contact_b: "تواصل مع المسؤول عبر تلغرام", title: "فتح حساب Apple ID", desc: "أكمل مهمة واحدة للحصول على حساب أبل إيدي.", unlock: "فتح الحساب الآن", decrypting: "جاري فك التشفير...", warning: "تم اكتشاف تجاوز - إعادة تعيين", vip: "احصل على اشتراك VIP", rules_h: "قواعد تسجيل الدخول", rules: "<p>• تسجيل الدخول في متجر التطبيقات فقط</p><p>• لا تستخدم إعدادات آي كلاود أبداً</p><p>• تسجيل الخروج بعد التحميل</p>",
                email: "SOON", pass: "SOON"
            }
        };

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            const content = document.getElementById('main-content');
            const rules = document.getElementById('rules-box');
            
            if(lang === 'ar') { content.classList.add('rtl'); rules.classList.add('rtl'); }
            else { content.classList.remove('rtl'); rules.classList.remove('rtl'); }

            document.getElementById('txt-contact-head').innerText = t.contact_h;
            document.getElementById('txt-contact-body').innerText = t.contact_b;
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-desc').innerText = t.desc;
            document.getElementById('unlockBtn').innerText = t.unlock;
            
            if(!timerStarted) {
                document.getElementById('timer-status').innerText = t.decrypting;
            }
            
            document.getElementById('txt-vip').innerText = t.vip;
            document.getElementById('txt-rules-head').innerText = t.rules_h;
            document.getElementById('txt-rules-list').innerHTML = t.rules;
            
            ['en', 'ru', 'ar'].forEach(l => {
                document.getElementById('btn-'+l).className = lang === l ? 'lang-btn lang-active' : 'lang-btn';
            });
        }

        function handleAdClick() {
            window.open(MONETAG_LINK, '_blank');
            timerStarted = true;
            document.getElementById('unlock-section').classList.add('hidden');
            document.getElementById('countdown-section').style.display = 'flex';
            startTimer();
        }

        document.addEventListener("visibilitychange", () => {
            if (document.hidden && timerStarted && timeRemaining > 0) {
                clearInterval(timerInterval);
                timeRemaining = 5; 
                document.getElementById('timer-text').innerText = "5s";
                document.getElementById('timer-circle').style.strokeDashoffset = 0;
                document.getElementById('timer-status').innerHTML = `<span style="color:#ff453a; font-weight:900; tracking-wide">${translations[currentLang].warning}</span>`;
            } else if (!document.hidden && timerStarted && timeRemaining > 0) { 
                document.getElementById('timer-status').innerText = translations[currentLang].decrypting;
                startTimer(); 
            }
        });

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeRemaining--;
                document.getElementById('timer-text').innerText = timeRemaining + "s";
                document.getElementById('timer-circle').style.strokeDashoffset = 377 - (timeRemaining / 5) * 377;
                if (timeRemaining <= 0) { 
                    clearInterval(timerInterval); 
                    showResult(); 
                }
            }, 1000);
        }

        function showResult() {
            document.getElementById('countdown-section').style.display = 'none';
            const resultSection = document.getElementById('result-section');
            
            resultSection.innerHTML = `
                <div class="glass p-6 text-center space-y-5">
                    <h3 class="text-green-400 font-black text-xl tracking-wide uppercase">🔓 Access Granted</h3>
                    <div class="text-left space-y-4">
                        <div class="flex flex-col space-y-1.5">
                            <label class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Apple ID / Email</label>
                            <input type="text" value="${translations[currentLang].email}" readonly class="ios-input w-full select-all focus:outline-none font-bold text-center tracking-widest text-blue-400">
                        </div>
                        <div class="flex flex-col space-y-1.5">
                            <label class="text-[10px] text-white/40 font-bold uppercase tracking-widest">Password</label>
                            <input type="text" value="${translations[currentLang].pass}" readonly class="ios-input w-full select-all focus:outline-none font-bold text-center tracking-widest text-blue-400">
                        </div>
                    </div>
                    <div class="text-[10px] text-amber-400 font-medium bg-amber-500/10 border border-amber-500/20 p-3.5 rounded-xl">
                        ⚠️ Important: Use the App Store context options only. Syncing configuration changes inside core iCloud settings is prohibited.
                    </div>
                </div>
            `;
            resultSection.classList.remove('hidden');
        }
    </script>
</body>
</html>
